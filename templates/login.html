{% extends 'base.html' %}

{% block title %}Iniciar Sesión | SENA{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg p-4" style="border-radius: 25px;">
            <div class="text-center mb-4">
                <!-- Logo del SENA -->
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Sena_Colombia_logo.svg" alt="SENA Logo" style="width: 80px;" class="mb-3">
                <h2 class="fw-bold">Bienvenido</h2>
                <p class="text-muted small text-uppercase fw-semibold" style="letter-spacing: 1px;">Gestor de Ambientes</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold small text-uppercase text-secondary">Usuario</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Ingrese su usuario" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold small text-uppercase text-secondary">Contraseña</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Ingrese su contraseña" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-sena py-2 fw-bold shadow-sm">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Sistema
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 text-muted small">¿No tienes una cuenta registrada?</p>
                <a href="{% url 'register' %}" class="text-success fw-bold text-decoration-none small">Crea una cuenta aquí</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
