<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestor de Ambientes{% endblock %}</title>
    <!-- Fuentes corporativas: Montserrat y Open Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos de Bootstrap (Carga global) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --sena-green: #39a900; }
        body { font-family: 'Open Sans', sans-serif; background-color: #fcfcfc; }
        h1, h2, h3, h4, h5, .navbar-brand { font-family: 'Montserrat', sans-serif; }

        /* Estilos globales para inputs y formularios */
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #ced4da;
            padding: 0.65rem 1rem;
            transition: all 0.2s ease-in-out;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--sena-green);
            box-shadow: 0 0 0 0.25rem rgba(57, 169, 0, 0.15);
            background-color: #fff;
        }

        .navbar { background-color: var(--sena-green); }
        
        /* Mejora estética de botones SENA */
        .btn-sena { 
            background-color: var(--sena-green); 
            color: white; 
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(.25,.8,.25,1);
            border: none;
        }
        .btn-sena:hover { 
            background-color: #2e8800; 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* Estilos mejorados para botones de acción (Modificar/Eliminar) */
        .btn-action {
            border-radius: 8px;
            transition: all 0.2s ease-in-out;
            border-width: 2px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn-modify { color: #0d6efd; border-color: #0d6efd; }
        .btn-modify:hover { background-color: #0d6efd; color: white; }
        .btn-delete { color: #dc3545; border-color: #dc3545; }
        .btn-delete:hover { background-color: #dc3545; color: white; }
        
        /* Logo de fondo sutil para toda la aplicación */
        body {
            background-image: linear-gradient(rgba(248, 249, 250, 0.97), rgba(248, 249, 250, 0.97)), url('https://upload.wikimedia.org/wikipedia/commons/8/83/Sena_Colombia_logo.svg');
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            background-size: 400px;
        }
    </style>
</head>
<body>
    <!-- Solo mostramos la barra de navegación si el usuario ha iniciado sesión -->
    {% if user.is_authenticated %}
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
        <div class="container">
            <!-- Logo/Nombre del sitio con enlace al inicio -->
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">SENA Ambientes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- Enlaces de navegación -->
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link text-white fw-bold" href="{% url 'environment_list' %}">Sedes</a></li>
                    <li class="nav-item"><a class="nav-link text-white fw-bold" href="{% url 'booking_list' %}">Mis Reservas</a></li>
                </ul>
                <!-- Información del usuario y botón de salir -->
                <div class="navbar-nav">
                    <a class="nav-item nav-link text-white me-3 fw-bold" href="{% url 'profile' %}">Mi Perfil ({{ user.username }})</a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}
    <!-- Contenedor principal donde se mostrarán los mensajes y el contenido de cada página -->
    <div class="container">
        <!-- Bloque para mostrar mensajes de éxito o error de Django -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <!-- Espacio reservado para el contenido específico de cada hijo que herede de base.html -->
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
